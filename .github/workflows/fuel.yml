on: 
  schedule: 
    - cron: "30 8 * * *" # 08:30 every day (UTC) workflow_dispatch:
  workflow_dispatch:

jobs:
  check-fuel:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run fuel checker
        env:
          PUSHOVER_KEY: ${{ secrets.PUSHOVER_KEY }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: python fuel_checker.py

      # Ensure the history file exists so git add never fails
      - name: Ensure history file exists
        run: |
          if [ ! -f fuel_history.json ]; then
            echo "[]" > fuel_history.json
          fi

      # Commit only if the file actually changed
      - name: Commit updated history
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add fuel_history.json

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update fuel history"
            git push
          fi
